<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân | Tech.no</title>
    <link rel="stylesheet" href="../../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-wrapper {
            margin-left: 265px;
            margin-right: 40px;
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 24px;
        }

        .profile-card,
        .profile-content {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 3px 16px rgba(0, 0, 0, 0.08);
        }

        .profile-card {
            overflow: hidden;
            height: fit-content;
        }

        .profile-cover {
            height: 96px;
            background: linear-gradient(135deg, #111827, #475569);
        }

        .profile-summary {
            padding: 24px;
            text-align: center;
        }

        .avatar-wrap {
            margin: 0 auto 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .user-avatar {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            object-fit: cover;
            background: #e5e7eb;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
            cursor: pointer;
        }

        .avatar-upload-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: #111827;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.2);
        }

        #avatar-input {
            display: none;
        }

        .profile-summary h2 {
            font-size: 20px;
            color: #111827;
            margin-bottom: 6px;
        }

        .profile-summary p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 14px;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 12px;
            border-radius: 999px;
            background: #ecfdf5;
            color: #15803d;
            font-size: 12px;
            font-weight: 700;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 18px 20px;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }

        .profile-stat {
            text-align: center;
        }

        .profile-stat strong {
            display: block;
            color: #111827;
            font-size: 18px;
            margin-bottom: 2px;
        }

        .profile-stat span {
            color: #64748b;
            font-size: 12px;
        }

        .profile-tabs {
            list-style: none;
            padding: 18px;
        }

        .profile-tabs li {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #475569;
            padding: 13px 14px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .profile-tabs li i {
            width: 18px;
            text-align: center;
        }

        .profile-tabs li:hover,
        .profile-tabs li.active {
            background: #111827;
            color: #ffffff;
        }

        .profile-content {
            padding: 28px;
            min-height: 560px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            padding-bottom: 20px;
            margin-bottom: 24px;
            border-bottom: 1px solid #e2e8f0;
        }

        .section-head h2 {
            color: #111827;
            font-size: 22px;
            margin-bottom: 6px;
        }

        .section-head p {
            color: #64748b;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            color: #374151;
            font-size: 13px;
            font-weight: 700;
        }

        .form-group input {
            width: 100%;
            padding: 12px 13px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            color: #111827;
            font-size: 14px;
            outline: none;
            background: #ffffff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus {
            border-color: #111827;
            box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
        }

        .panel-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .profile-btn {
            border: none;
            border-radius: 8px;
            padding: 11px 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .profile-btn.primary {
            background: #111827;
            color: #ffffff;
        }

        .profile-btn.primary:hover {
            background: #334155;
        }

        .profile-btn.secondary {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #e2e8f0;
        }

        .profile-btn.secondary:hover {
            background: #e2e8f0;
        }

        @media (max-width: 1024px) {
            .profile-wrapper {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .profile-wrapper {
                margin-left: 20px;
                margin-right: 20px;
            }

            .page-header {
                margin-left: 0;
                align-items: flex-start;
                flex-direction: column;
            }

            .form-grid,
            .order-item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="admin-sidebar-container"></div>

    <main class="page-content">
        <div class="page-header">
            <div class="header-left">
                <div class="header-icon" style="background: linear-gradient(135deg,#0f172a,#334155); color: #ffffff;">
                    <i class="fa-solid fa-user-gear"></i>
                </div>
                <div>
                    <h1>Trang cá nhân</h1>
                    <p>Quản lý thông tin tài khoản, bảo mật và hoạt động của quản trị viên</p>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary">
                    <i class="fa-solid fa-download"></i> Xuất hồ sơ
                </button>
            </div>
        </div>

        <div class="profile-wrapper">
            <aside class="profile-card">
                <div class="profile-cover"></div>
                <div class="profile-summary">
                    <div class="avatar-wrap">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='60' cy='60' r='60' fill='%23d8dde6'/%3E%3Ccircle cx='60' cy='45' r='23' fill='%23ffffff'/%3E%3Cpath d='M18 116c7-27 25-42 42-42s35 15 42 42' fill='%23ffffff'/%3E%3C/svg%3E" alt="Avatar" class="user-avatar" id="user-avatar">
                        <button class="avatar-upload-btn" id="upload-trigger" type="button" title="Thay đổi ảnh">
                            <i class="fa-solid fa-camera"></i>
                        </button>
                        <input type="file" id="avatar-input" accept="image/*">
                    </div>
                    <h2 id="card-display-name">Đang tải...</h2>
                    <p id="card-email">đang tải...</p>
                    <span class="admin-badge"><i class="fa-solid fa-shield-halved"></i> Quản trị viên</span>
                </div>

                <ul class="profile-tabs">
                    <li class="active" data-tab="thong-tin"><i class="fa-solid fa-user"></i>Thông tin tài khoản</li>
                    <li data-tab="bao-mat"><i class="fa-solid fa-lock"></i>Bảo mật</li>
                </ul>
            </aside>

            <section class="profile-content">
                <div id="thong-tin" class="tab-panel active">
                    <div class="section-head">
                        <div>
                            <h2>Thông tin tài khoản</h2>
                            <p>Cập nhật thông tin hiển thị và địa chỉ liên hệ của bạn</p>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Họ và tên</label>
                            <input type="text" id="fullName" value="" placeholder="Đang tải dữ liệu...">
                        </div>
                        <div class="form-group">
                            <label for="phone">Số điện thoại</label>
                            <input type="tel" id="phone" value="" placeholder="Nhập số điện thoại">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" value="" disabled style="background-color: #f3f4f6; cursor: not-allowed;">
                        </div>
                        <div class="form-group full-width">
                            <label for="address">Địa chỉ nhận hàng</label>
                            <input type="text" id="address" value="" placeholder="Nhập địa chỉ của bạn">
                        </div>
                    </div>

                    <div class="panel-actions">
                        <button class="profile-btn secondary" type="button" id="btn-cancel-profile">Hủy</button>
                        <button class="profile-btn primary" type="button" id="btn-save-profile">
                            <i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi
                        </button>
                    </div>
                </div>

                <div id="bao-mat" class="tab-panel">
                    <div class="section-head">
                        <div>
                            <h2>Bảo mật</h2>
                            <p>Đổi mật khẩu định kỳ để bảo vệ tài khoản quản trị</p>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="oldPassword">Mật khẩu cũ</label>
                            <input type="password" id="oldPassword" placeholder="Nhập mật khẩu hiện tại">
                        </div>
                        <div class="form-group">
                            <label for="newPassword">Mật khẩu mới</label>
                            <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Xác nhận mật khẩu</label>
                            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới">
                        </div>
                    </div>

                    <div class="panel-actions">
                        <button class="profile-btn primary" type="button" id="btn-update-password">
                            <i class="fa-solid fa-key"></i> Cập nhật mật khẩu
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../assets/js/supabase-config.js"></script>
    <script src="../../assets/js/main.js"></script>
    
    <script>
        // Xử lý chuyển đổi qua lại giữa các Tab chức năng độc lập
        const menuItems = document.querySelectorAll('.profile-tabs li');

        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                const activeMenu = document.querySelector('.profile-tabs li.active');
                const activePanel = document.querySelector('.tab-panel.active');

                if (activeMenu) activeMenu.classList.remove('active');
                if (activePanel) activePanel.classList.remove('active');

                item.classList.add('active');
                const tabId = item.getAttribute('data-tab');
                const targetPanel = document.getElementById(tabId);
                if (targetPanel) targetPanel.classList.add('active');
            });
        });

        // Xử lý sự kiện xem trước hình ảnh Avatar tải lên cục bộ
        const avatarInput = document.getElementById('avatar-input');
        const userAvatar = document.getElementById('user-avatar');
        const uploadTrigger = document.getElementById('upload-trigger');

        if (avatarInput && userAvatar && uploadTrigger) {
            const openSelector = () => avatarInput.click();
            uploadTrigger.addEventListener('click', openSelector);
            userAvatar.addEventListener('click', openSelector);

            avatarInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    alert('Vui lòng chọn một file hình ảnh đúng định dạng!');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (readerEvent) => {
                    userAvatar.src = readerEvent.target.result;
                };
                reader.onerror = () => {
                    alert('Có lỗi xảy ra khi đọc dữ liệu file ảnh này.');
                };
                reader.readAsDataURL(file);
            });
        }

        // ==========================================
        // LOGIC KẾT NỐI VÀ THAO TÁC VỚI SUPABASE
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Kiểm tra xem thực thể client Supabase đã tồn tại trên window hay chưa
            if (!window.supabaseClient) {
                console.error("Không tìm thấy window.supabaseClient. Hãy kiểm tra lại thứ tự nạp thẻ script hoặc file supabase-config.js.");
                alert("Lỗi hệ thống: Không thể kết nối tới máy chủ Supabase.");
                return;
            }

            const client = window.supabaseClient;

            // DOM Elements quản lý form dữ liệu cá nhân Admin
            const fullNameInput = document.getElementById('fullName');
            const phoneInput = document.getElementById('phone');
            const emailInput = document.getElementById('email');
            const addressInput = document.getElementById('address');

            const cardDisplayName = document.getElementById('card-display-name');
            const cardEmail = document.getElementById('card-email');

            const btnSaveProfile = document.getElementById('btn-save-profile');
            const btnCancelProfile = document.getElementById('btn-cancel-profile');

            // DOM Elements quản lý Đổi mật khẩu
            const oldPasswordInput = document.getElementById('oldPassword');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const btnUpdatePassword = document.getElementById('btn-update-password');

            // Biến cục bộ lưu trữ bản ghi gốc phục vụ tính năng 'Hủy' không lưu
            let originalProfileData = null;

            // Bước 1: Lấy thông tin phiên đăng nhập của User hiện tại từ hệ thống Auth Supabase
            const { data: { user }, error: authError } = await client.auth.getUser();

            if (authError || !user) {
                alert('Phiên làm việc đã hết hạn hoặc bạn chưa đăng nhập. Hệ thống sẽ chuyển hướng về trang đăng nhập.');
                window.location.href = '../login.html';
                return;
            }

            // Bước 2: Truy vấn dữ liệu thực tế từ bảng công khai `public.users` theo `id` để xác thực quyền Admin
            async function fetchAndPopulateAdminProfile() {
                try {
                    const { data: profile, error: dbError } = await client
                        .from('users')
                        .select('*')
                        .eq('id', user.id)
                        .maybeSingle();

                    if (dbError) throw dbError;

                    if (!profile) {
                        alert('Không tìm thấy thông tin cấu hình tài khoản của bạn trong cơ sở dữ liệu hệ thống.');
                        return;
                    }

                    // Kiểm tra nghiêm ngặt phân quyền Role. Phải là 'admin' mới được ở lại quản trị vùng này.
                    if (profile.role !== 'admin') {
                        alert('Cảnh báo bảo mật: Tài khoản của bạn không có đặc quyền truy cập khu vực dành cho Quản trị viên!');
                        window.location.href = '../../index.html';
                        return;
                    }

                    // Lưu dữ liệu gốc để khôi phục khi nhấn hủy
                    originalProfileData = profile;

                    // Thực hiện map dữ liệu vào giao diện form và thẻ summary bên góc trái
                    fullNameInput.value = profile.display_name || '';
                    phoneInput.value = profile.phone || '';
                    emailInput.value = profile.email || user.email || '';
                    addressInput.value = profile.address || '';

                    cardDisplayName.textContent = profile.display_name || 'Quản trị viên';
                    cardEmail.textContent = profile.email || user.email || '';

                } catch (err) {
                    console.error('Lỗi khi tải thông tin hồ sơ Admin:', err.message);
                    alert('Hệ thống lỗi phân quyền toàn cục gặp sự cố nghiêm trọng: ' + err.message);
                }
            }

            // Thực thi việc nạp dữ liệu ban đầu
            await fetchAndPopulateAdminProfile();

            // Tính năng nút Hủy: Khôi phục lại trạng thái dữ liệu trước khi chỉnh sửa từ bản lưu cục bộ
            if (btnCancelProfile) {
                btnCancelProfile.addEventListener('click', () => {
                    if (originalProfileData) {
                        fullNameInput.value = originalProfileData.display_name || '';
                        phoneInput.value = originalProfileData.phone || '';
                        addressInput.value = originalProfileData.address || '';
                        alert('Đã hủy bỏ các thay đổi vừa nhập.');
                    }
                });
            }

            // Bước 3: Đăng ký sự kiện lưu thông tin cập nhật tài khoản cá nhân Admin
            if (btnSaveProfile) {
                btnSaveProfile.addEventListener('click', async () => {
                    const updatedName = fullNameInput.value.trim();
                    const updatedPhone = phoneInput.value.trim();
                    const updatedAddress = addressInput.value.trim();

                    if (!updatedName) {
                        alert('Trường Họ và tên bắt buộc phải điền thông tin hiển thị!');
                        return;
                    }

                    // Chuyển nút sang trạng thái Loading chặn click trùng lặp dữ liệu
                    btnSaveProfile.disabled = true;
                    btnSaveProfile.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu...';

                    try {
                        // Đồng bộ dữ liệu cập nhật thẳng vào các trường `display_name`, `phone`, `address`
                        const { error: updateError } = await client
                            .from('users')
                            .update({
                                display_name: updatedName,
                                phone: updatedPhone,
                                address: updatedAddress
                            })
                            .eq('id', user.id);

                        if (updateError) throw updateError;

                        alert('Chúc mừng! Đã cập nhật thành công hồ sơ tài khoản Quản trị viên của bạn.');

                        // Cập nhật lại UI text hiển thị tức thì trên thanh thông tin tóm tắt bên cạnh
                        cardDisplayName.textContent = updatedName;
                        
                        // Cập nhật lại đối tượng gốc để tránh lỗi khi ấn Hủy sau đó
                        originalProfileData.display_name = updatedName;
                        originalProfileData.phone = updatedPhone;
                        originalProfileData.address = updatedAddress;

                    } catch (err) {
                        console.error('Lỗi cập nhật dữ liệu public.users:', err.message);
                        alert('Không thể lưu dữ liệu cập nhật: ' + err.message);
                    } finally {
                        btnSaveProfile.disabled = false;
                        btnSaveProfile.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi';
                    }
                });
            }

            // Bước 4: Đăng ký sự kiện đổi mật khẩu cho tài khoản Admin
            if (btnUpdatePassword) {
                btnUpdatePassword.addEventListener('click', async () => {
                    const newPassword = newPasswordInput.value;
                    const confirmPassword = confirmPasswordInput.value;

                    if (!newPassword || !confirmPassword) {
                        alert('Vui lòng nhập đầy đủ thông tin vào cả hai ô mật khẩu mới và ô xác nhận.');
                        return;
                    }

                    if (newPassword !== confirmPassword) {
                        alert('Mật khẩu xác nhận nhập lại không khớp với mật khẩu mới!');
                        return;
                    }

                    if (newPassword.length < 6) {
                        alert('Để bảo mật, mật khẩu quản trị viên mới của bạn tối thiểu phải có chiều dài 6 ký tự.');
                        return;
                    }

                    btnUpdatePassword.disabled = true;
                    btnUpdatePassword.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang cập nhật...';

                    try {
                        // Gọi API cập nhật mật khẩu trực tiếp từ Supabase Auth
                        const { error: pwdError } = await client.auth.updateUser({
                            password: newPassword
                        });

                        if (pwdError) throw pwdError;

                        alert('Cập nhật thay đổi mật khẩu hệ thống tài khoản thành công!');
                        
                        // Reset sạch các trường mật khẩu vừa nhập
                        if (oldPasswordInput) oldPasswordInput.value = '';
                        newPasswordInput.value = '';
                        confirmPasswordInput.value = '';

                    } catch (err) {
                        console.error('Lỗi cập nhật mật khẩu Auth:', err.message);
                        alert('Cập nhật mật khẩu thất bại: ' + err.message);
                    } finally {
                        btnUpdatePassword.disabled = false;
                        btnUpdatePassword.innerHTML = '<i class="fa-solid fa-key"></i> Cập nhật mật khẩu';
                    }
                });
            }
        });
    </script>
</body>
</html>
