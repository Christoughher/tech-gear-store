<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập - Tech.no</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        #login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.1);
        }

        #login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .input-group input:focus {
            border-color: #000;
        }

        .change-to-register {
            margin: 10px 0 0 25px;
            font-size: 14px;
        }

        .change-to-register a {
            text-decoration: none;
            color: #0073ff;
        }

        .change-to-register a:hover {
            color: #b9c7ff
        }
        .login-submit {
            width: 100%;
            padding: 12px;
            border: none;
            background: black;
            color: white;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-submit:hover {
            background: #444444;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }

        .back-home:hover {
            color: black;
        }

        #register-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.1);
            margin-top: 130px;  
            display: none;
        }

        .register-submit {
            width: 100%;
            padding: 12px;
            border: none;
            background: black;
            color: white;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .change-to-login {
            margin: 10px 0 0 45px;
            font-size: 14px;
        }

        .change-to-login a {
            text-decoration: none;
            color: blue;
        }

        .change-to-login a:hover {
            color: #72b6da
        }

        #register-box h2 {
            margin-left: 85px;
        }


    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <!-- LOGIN FORM -->
    <div class="auth-container">
        <div id="login-box">
            <h2>Đăng nhập</h2>
            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Nhập email" id="email">
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu" id="password">
                </div>

                <button type="submit" class="login-submit">
                    Đăng nhập
                </button>
            </form> 

            <p class="change-to-register">
                Chưa có tài khoản? <a href="#" id="show-register">Đăng ký ngay</a>
            </p>

            <a href="../index.html" class="back-home">
                ← Quay lại trang chủ
            </a>
        </div>

        <div id="register-box">
            <h2>Đăng ký</h2>
            <form id="register-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="register-email" placeholder="Nhập email">
                </div>

                <div class="input-group">
                    <label>Tên tài khoản</label>
                    <input type="text" id="register-fullname" placeholder="Nhập tên tài khoản">
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="register-password" placeholder="Nhập mật khẩu">
                </div>

                <div class="input-group">
                    <label>Nhập lại mật khẩu</label>
                    <input type="password" id="register-confirm-password" placeholder="Nhập lại mật khẩu">
                </div>

                <button type="submit" class="register-submit">
                    Đăng ký
                </button>
            </form> 

            <p class="change-to-login">
                Đã có tài khoản? <a href="#" id="show-login">Đăng nhập</a>
            </p>

            <a href="../index.html" class="back-home">
                ← Quay lại trang chủ
            </a>
        </div>

        
    </div>

    <div id="footer-container"></div>

    <!-- Supabase Library từ CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Config & Auth Scripts -->
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>
</body>
</html>
