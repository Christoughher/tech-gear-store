<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Giỏ hàng - Tech.no</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        .cart-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        .cart-box {
            background: white;
            width: 700px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.1);
            margin-top: 100px;
        }

        .cart-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #222;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #e5e5e5;
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-name {
            font-size: 17px;
            font-weight: 600;
            color: #222;
        }

        .item-price {
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }

        .item-quantity input {
            width: 60px;
            padding: 8px;
            border: 1px solid #dcdcdc;
            border-radius: 5px;
            outline: none;
            text-align: center;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
            color: #222;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            background: black;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: #444;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 18px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }

        .back-home:hover {
            color: black;
        }

    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <!-- CART -->
    <div class="cart-container">

        <div class="cart-box">

            <h2>Giỏ hàng của bạn</h2>

            <!-- CART ITEMS CONTAINER -->
            <div id="cart-items-container">
                <!-- Sản phẩm sẽ được render tại đây -->
            </div>

            <!-- EMPTY CART MESSAGE -->
            <div id="empty-cart-message" style="display: none; text-align: center; padding: 40px 0; color: #999;">
                <p style="font-size: 16px; margin-bottom: 20px;">Giỏ hàng của bạn trống</p>
                <a href="../index.html" class="back-home">← Tiếp tục mua sắm</a>
            </div>

            <!-- TOTAL -->
            <div class="cart-total" id="cart-total-section" style="display: none;">
                <span>Tổng cộng:</span>
                <span id="total-price">0đ</span>
            </div>

            <!-- CHECKOUT BUTTON -->
            <button class="checkout-btn" id="checkout-btn" style="display: none;">
                Thanh toán
            </button>

            <!-- BACK -->
            <a href="../index.html" class="back-home" id="back-home-link" style="display: none;">
                ← Tiếp tục mua sắm
            </a>

        </div>

    </div>
    
    <div id="footer-container"></div>

    <script src="/assets/js/cart.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        // Hàm để format tiền tệ
        function formatCurrency(amount) {
            return amount.toLocaleString('vi-VN') + 'đ';
        }

        // Hàm render giỏ hàng
        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const emptyMessage = document.getElementById('empty-cart-message');
            const totalSection = document.getElementById('cart-total-section');
            const checkoutBtn = document.getElementById('checkout-btn');
            const backHomeLink = document.getElementById('back-home-link');
            const cartItems = shopCart.getCart();

            container.innerHTML = ''; // Xóa nội dung cũ

            if (cartItems.length === 0) {
                // Hiển thị thông báo giỏ hàng trống
                emptyMessage.style.display = 'block';
                totalSection.style.display = 'none';
                checkoutBtn.style.display = 'none';
                backHomeLink.style.display = 'block';
                return;
            }

            // Ẩn thông báo giỏ hàng trống
            emptyMessage.style.display = 'none';
            totalSection.style.display = 'flex';
            checkoutBtn.style.display = 'block';
            backHomeLink.style.display = 'block';

            // Render từng sản phẩm
            cartItems.forEach(item => {
                const itemElement = document.createElement('div');
                itemElement.className = 'cart-item';
                itemElement.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-price">${formatCurrency(item.price)}</span>
                    </div>

                    <div class="item-quantity">
                        <input type="number" value="${item.quantity}" min="1" data-product-id="${item.id}">
                    </div>

                    <div style="margin-left: 20px;">
                        <button class="btn-remove" data-product-id="${item.id}" style="
                            background: #ff4444;
                            color: white;
                            border: none;
                            padding: 8px 12px;
                            border-radius: 5px;
                            cursor: pointer;
                            font-size: 13px;
                        ">Xóa</button>
                    </div>
                `;

                container.appendChild(itemElement);
            });

            // Cập nhật tổng tiền
            updateCartTotal();

            // Gắn sự kiện cho input quantity
            document.querySelectorAll('.item-quantity input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const productId = e.target.getAttribute('data-product-id');
                    const newQuantity = parseInt(e.target.value);
                    if (newQuantity > 0) {
                        shopCart.updateQuantity(productId, newQuantity);
                        renderCart(); // Render lại để cập nhật tổng tiền
                    }
                });
            });

            // Gắn sự kiện cho nút xóa
            document.querySelectorAll('.btn-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const productId = e.target.getAttribute('data-product-id');
                    shopCart.removeProduct(productId);
                    renderCart(); // Render lại giỏ hàng
                });
            });
        }

        // Hàm cập nhật tổng tiền
        function updateCartTotal() {
            const total = shopCart.getTotal();
            document.getElementById('total-price').textContent = formatCurrency(total);
        }

        // Chạy khi trang tải xong
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();

            // Gắn sự kiện cho nút thanh toán
            document.getElementById('checkout-btn').addEventListener('click', () => {
                alert('Cảm ơn bạn! Chức năng thanh toán sẽ sớm được triển khai.');
                // Có thể thêm redirect đến trang thanh toán ở đây
                // window.location.href = 'checkout.html';
            });
        });
    </script>

    <!-- Supabase Library từ CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Config & Auth Scripts -->
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>
</body>
</html>
